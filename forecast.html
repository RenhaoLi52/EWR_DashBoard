<html lang="zh">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans)}
  body{min-height:100vh;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer}
  .num{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .wrap{max-width:1180px;margin:0 auto;padding:26px 22px 70px}
  header.top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:22px;flex-wrap:wrap}
  .brand{display:flex;flex-direction:column;gap:3px}
  .brand .kick{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);font-weight:600}
  .brand h1{margin:0;font-size:25px;font-weight:700;letter-spacing:-.01em}
  .brand .sub{color:var(--muted);font-size:13px}
  .conn{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--muted);white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex:none}
  .dot.ok{background:var(--green)}.dot.err{background:var(--red)}
  .controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:20px}
  .fld{display:flex;flex-direction:column;gap:6px}
  .fld label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  input,select{background:var(--raised);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:10px 12px;font-size:13.5px;font-family:var(--mono)}
  input:focus,select:focus{outline:none;border-color:var(--orange)}
  .btn{border:1px solid var(--line);background:var(--raised);color:var(--ink);padding:10px 15px;border-radius:9px;font-size:13px;font-weight:600;transition:.14s}
  .btn.primary{background:var(--orange);border-color:var(--orange);color:#1a1205}
  .btn.primary:hover{background:#f59a4d}
  .spacer{flex:1 1 auto}
  .result{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:12px;margin-bottom:22px}
  @media(max-width:720px){.result{grid-template-columns:1fr}}
  .rcard{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;padding:18px 19px;position:relative;overflow:hidden}
  .rcard .accentbar{position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--orange)}
  .rcard .lab{font-size:12px;color:var(--muted);margin-bottom:9px}
  .rcard .big{font-family:var(--mono);font-size:38px;font-weight:700;line-height:1;letter-spacing:-.01em}
  .rcard .rng{font-family:var(--mono);font-size:14px;color:var(--orange);margin-top:7px}
  .rcard .sub{font-size:12px;color:var(--faint);margin-top:9px;line-height:1.5}
  .rcard .mid{font-family:var(--mono);font-size:22px;font-weight:600}
  .panel{background:var(--panel);border:1px solid var(--line-soft);border-radius:12px;overflow:hidden;margin-bottom:22px}
  .phead{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line-soft)}
  .phead .tick{width:4px;height:15px;border-radius:2px;background:var(--orange)}
  .phead h2{margin:0;font-size:14px;font-weight:600}
  .phead .hint{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--faint)}
  .pbody{padding:16px}
  #chartBox{position:relative;height:360px}
  .empty{color:var(--muted);text-align:center;padding:42px 12px;font-size:13.5px}
  .note{background:var(--raised);border:1px solid var(--line);border-radius:10px;padding:12px 14px;color:var(--muted);font-size:12.5px;line-height:1.6;margin-bottom:20px}
  .note b{color:var(--ink)}
  .setup{max-width:640px;margin:40px auto;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:26px}
  .setup h2{margin:0 0 10px;font-size:18px}.setup p{color:var(--muted);font-size:13.5px;line-height:1.6}
  .setup code{background:var(--raised);padding:2px 6px;border-radius:5px;font-family:var(--mono);color:var(--orange)}
  @media (prefers-reduced-motion:no-preference){.rcard,.panel{animation:fade .28s ease both}@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}}
</style>
</head>
<body data-page="forecast">
<div id="nav-slot"></div>

<div id="setup" class="setup" style="display:none">
  <h2>还差一步：填入 Supabase 连接信息</h2>
  <p>打开本文件，把顶部 <code>SUPABASE_URL</code> 和 <code>SUPABASE_ANON_KEY</code> 换成你的值后刷新。</p>
</div>

<div class="wrap" id="app" style="display:none">
  <header class="top">
    <div class="brand">
      <div class="kick">Night Dispatch</div>
      <h1>货量预测</h1>
      <div class="sub">按历史日内进度曲线，预测某仓库某时刻的累计货量</div>
    </div>
    <div class="conn"><span class="dot" id="connDot"></span><span id="connText">连接中…</span></div>
  </header>

  <div class="controls">
    <div class="fld"><label>仓库</label><select id="whSelect" style="min-width:190px"></select></div>
    <div class="fld"><label>目标批次</label><select id="batchSelect" style="min-width:230px"></select></div>
    <div class="fld"><label>目标时间（备货日）</label><input type="time" id="timePick" value="19:00" step="600" /></div>
    <div class="fld"><label>训练批次数</label><input type="number" id="nDays" value="10" min="2" max="60" style="width:96px" /></div>
    <div class="spacer"></div>
    <button class="btn primary" id="predictBtn">预测</button>
  </div>

  <div class="note">
    原理：用过去 N 天该仓库的累计曲线，归一化成“占当日最终值的百分比 vs 时间”求平均，得到典型日内进度。
    若目标当天已有数据，会用最新的点<b>反推今天的最终值</b>再预测（更准）；当天还没数据则用历史平均。
    <b>范围</b>来自历史同一时刻的波动。数据越多、当天已抓到的点越多，越准。
  </div>

  <div class="result" id="result"></div>

  <div class="panel">
    <div class="phead"><span class="tick"></span><h2>日内曲线</h2><span class="hint" id="chartSub"></span></div>
    <div class="pbody"><div id="chartBox"><canvas id="chart"></canvas></div></div>
  </div>
</div>

<script>
fetch("nav.html").then(r=>r.text()).then(h=>{document.getElementById("nav-slot").innerHTML=h;});

/* ===== Supabase（SUPABASE_ANON_KEY 填 Publishable key sb_publishable_…） ===== */
const SUPABASE_URL      = "https://euibahjwdfgtoqvchibb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_dQ1a562_DS1hN9i1G1O3jA_PlgXE54E";
/* ============================================================== */

const TZ="America/New_York";
const $=s=>document.querySelector(s);
let sb=null, chart=null;
const state={ batches:[] };

/* ---------- 纽约时区工具 ---------- */
function tzOffset(date){
  const p=new Intl.DateTimeFormat("en-US",{timeZone:TZ,hourCycle:"h23",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"})
    .formatToParts(date).reduce((a,x)=>(a[x.type]=x.value,a),{});
  return (Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute,+p.second)-date.getTime())/60000;
}
/* 纽约本地时间 → UTC 毫秒 */
function nyToUTC(y,mo,d,h,mi){
  const guess=Date.UTC(y,mo-1,d,h,mi);
  let off=tzOffset(new Date(guess));
  let inst=guess-off*60000;
  off=tzOffset(new Date(inst));
  return guess-off*60000;
}
/* UTC 瞬间 → 纽约的 {日期, 钟点} */
function nyStamp(ms){
  const p=new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hourCycle:"h23"})
    .formatToParts(new Date(ms)).reduce((a,x)=>(a[x.type]=x.value,a),{});
  return { date:`${p.year}-${p.month}-${p.day}`, hm:`${p.hour}:${p.minute}` };
}

/* ---------- 单号解析 ----------
   NJSUB-YYYYMMDDHHMM：第0天生成时刻，就是这个批次的“起点”。
   备货日(第1天) = 第0天 + 1。派送(第2天) = 第0天 + 2。 */
function batchStart(batch){                       // → UTC 毫秒
  const m=(batch||"").match(/(20\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
  if(!m) return null;
  return nyToUTC(+m[1],+m[2],+m[3],+m[4],+m[5]);
}
function stockDay(batch){                         // 备货日 = 单号日期 + 1
  const m=(batch||"").match(/(20\d{2})(\d{2})(\d{2})/);
  if(!m) return null;
  const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3]+1));
  return {y:d.getUTCFullYear(), mo:d.getUTCMonth()+1, d:d.getUTCDate(),
          str:`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`};
}
function batchLabel(b){ const s=stockDay(b); return s ? `${s.str} 备货 · ${b}` : b; }

/* 批次内的相对时间(分钟) ←→ 显示标签 */
function elapsedMin(capturedISO, start){ return Math.round((new Date(capturedISO).getTime()-start)/60000); }
function tLabel(t, start){ const s=nyStamp(start+t*60000); return s.hm; }

/* 目标时刻：备货日的某个钟点 → 相对分钟 */
function targetT(batch, hhmm){
  const sd=stockDay(batch), start=batchStart(batch);
  if(!sd||start==null) return null;
  const [h,mi]=hhmm.split(":").map(Number);
  return Math.round((nyToUTC(sd.y,sd.mo,sd.d,h,mi)-start)/60000);
}
function hhmmOf(t,start){ return tLabel(t,start); }

/* ---------- 预测数学 ---------- */
function qtyAt(pts,t){
  if(!pts.length) return null;
  if(t<=pts[0].t) return pts[0].qty;
  if(t>=pts[pts.length-1].t) return pts[pts.length-1].qty;
  for(let i=1;i<pts.length;i++){ if(t<=pts[i].t){ const a=pts[i-1],b=pts[i];
    return a.qty+(b.qty-a.qty)*((t-a.t)/(b.t-a.t)); } }
  return pts[pts.length-1].qty;
}
const finalOf=pts=>pts.length?Math.max(...pts.map(p=>p.qty)):0;
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const std=a=>a.length<2?0:Math.sqrt(mean(a.map(x=>(x-mean(a))**2)));

function buildModel(history){
  const days=history.filter(d=>finalOf(d.points)>0 && d.points.length>=3);
  const finals=days.map(d=>finalOf(d.points));
  return {
    days,
    histFinal:    days.length?mean(finals):0,
    histFinalStd: days.length?std(finals):0,
    fbar: t=> days.length?mean(days.map(d=>qtyAt(d.points,t)/finalOf(d.points))):0,
    fsig: t=> days.length?std (days.map(d=>qtyAt(d.points,t)/finalOf(d.points))):0,
  };
}
function predict(model, targetPoints, T){
  if(model.days.length===0) return {ok:false};
  const before=(targetPoints||[]).filter(p=>p.t<=T).sort((a,b)=>a.t-b.t);
  let estFinal, calibrated=false, anchor=null;
  if(before.length){
    anchor=before[before.length-1];
    const fa=model.fbar(anchor.t);
    if(fa>0.1){ estFinal=anchor.qty/fa; calibrated=true; } else estFinal=model.histFinal;
  } else estFinal=model.histFinal;
  const fT=model.fbar(T), sT=model.fsig(T);
  const pred=estFinal*fT;
  let band=estFinal*sT + (calibrated?0:model.histFinalStd*fT);
  band=Math.max(band, pred*0.03);
  return {ok:true, pred:Math.round(pred), band:Math.round(band),
          lo:Math.max(0,Math.round(pred-band)), hi:Math.round(pred+band),
          estFinal:Math.round(estFinal), calibrated, anchor, daysUsed:model.days.length};
}

/* ---------- 初始化 ---------- */
function init(){
  if(SUPABASE_URL.includes("你的项目")||SUPABASE_ANON_KEY.includes("在此")){ $("#setup").style.display="block"; return; }
  $("#app").style.display="block";
  sb=supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  $("#predictBtn").onclick=doPredict;
  Promise.all([loadWarehouses(), loadBatches()])
    .then(()=>{ setConn(true,"已连接"); doPredict(); })
    .catch(e=>setConn(false,"连接失败："+(e.message||e)));
}
function setConn(ok,t){ $("#connDot").className="dot "+(ok?"ok":"err"); $("#connText").textContent=t; }

async function loadWarehouses(){
  const { data, error } = await sb.from("warehouse_list").select("warehouse_id,warehouse_name").limit(500);
  if(error) throw error;
  const arr=(data||[]).map(r=>({id:r.warehouse_id, name:r.warehouse_name||String(r.warehouse_id)}))
    .sort((a,b)=>a.name.localeCompare(b.name));
  const sel=$("#whSelect"); sel.innerHTML="";
  arr.forEach(w=>{ const o=document.createElement("option"); o.value=w.id; o.textContent=`${w.name} (${w.id})`; sel.appendChild(o); });
}

async function loadBatches(){
  const { data, error } = await sb.from("warehouse_batches")
    .select("batch").order("batch",{ascending:false}).limit(200);
  if(error) throw error;
  state.batches=(data||[]).map(r=>r.batch).filter(b=>batchStart(b)!=null);  // 单号自带时间戳，倒序即最新在前
  const sel=$("#batchSelect"); sel.innerHTML="";
  state.batches.forEach(b=>{ const o=document.createElement("option"); o.value=b; o.textContent=batchLabel(b); sel.appendChild(o); });
}

/* 取若干批次的数据 → Map(batch → [{t,qty}])，t 是距该批开始的分钟数 */
async function fetchBatches(whId, batches){
  let all=[], from=0, page=1000;
  while(true){
    const { data, error } = await sb.from("warehouse_snapshots")
      .select("batch_no,captured_at,qty")
      .eq("warehouse_id", whId).in("batch_no", batches)
      .order("captured_at",{ascending:true}).range(from, from+page-1);
    if(error) throw error;
    all=all.concat(data||[]);
    if(!data || data.length<page) break;
    from+=page;
  }
  const byBatch=new Map();
  for(const r of all){
    const st=batchStart(r.batch_no); if(st==null) continue;
    if(!byBatch.has(r.batch_no)) byBatch.set(r.batch_no,[]);
    byBatch.get(r.batch_no).push({ t:elapsedMin(r.captured_at, st), qty:r.qty });
  }
  for(const pts of byBatch.values()) pts.sort((a,b)=>a.t-b.t);
  return byBatch;
}

async function doPredict(){
  const whId=Number($("#whSelect").value);
  const target=$("#batchSelect").value;
  const n=Math.max(2, Number($("#nDays").value)||10);
  if(!whId || !target) return;
  const T=targetT(target, $("#timePick").value);
  if(T==null) return;

  setConn(true,"计算中…");
  try{
    const i=state.batches.indexOf(target);
    const hist=state.batches.slice(i+1, i+1+n);          // 更早的 n 个批次
    const byBatch=await fetchBatches(whId, [target, ...hist]);
    const targetPoints=byBatch.get(target)||[];
    const history=hist.map(b=>({batch:b, points:byBatch.get(b)||[]})).filter(h=>h.points.length);
    const model=buildModel(history);
    const res=predict(model, targetPoints, T);
    renderResult(res, targetPoints, T, target);
    renderChart(model, history, targetPoints, res, T, target);
    setConn(true,"已连接");
  }catch(e){ console.error(e); setConn(false,"出错："+(e.message||e)); }
}

function renderResult(res, targetPoints, T, batch){
  const box=$("#result"); const start=batchStart(batch); const sd=stockDay(batch);
  if(!res.ok){
    box.innerHTML=`<div class="rcard"><div class="accentbar"></div><div class="lab">预测</div>
      <div class="empty" style="padding:10px 0">历史批次不足，先多攒几天。至少 2 个，建议 7–10 个。</div></div>`;
    return;
  }
  const last = targetPoints.length ? targetPoints[targetPoints.length-1] : null;
  const actual = (last && last.t>=T) ? Math.round(qtyAt(targetPoints,T)) : null;
  const warn = res.daysUsed<7 ? `<div class="sub" style="color:var(--orange)">⚠ 只用了 ${res.daysUsed} 个历史批次，精度有限，攒够 7–10 个更稳。</div>` : "";
  box.innerHTML=`
    <div class="rcard"><div class="accentbar"></div>
      <div class="lab">${sd?sd.str:""} 备货 · ${hhmmOf(T,start)} 预测货量</div>
      <div class="big num">${res.pred.toLocaleString()}</div>
      <div class="rng">± ${res.band}　( ${res.lo} – ${res.hi} )</div>
      ${warn}
    </div>
    <div class="rcard"><div class="accentbar" style="background:var(--blue)"></div>
      <div class="lab">估计这批最终货量</div>
      <div class="mid num">${res.estFinal.toLocaleString()}</div>
      <div class="sub">${res.calibrated
        ? `已用本批 ${hhmmOf(res.anchor.t,start)} 的实测 ${res.anchor.qty} 校准`
        : `本批 ${hhmmOf(T,start)} 前还没数据，用历史平均`}</div>
    </div>
    <div class="rcard"><div class="accentbar" style="background:var(--green)"></div>
      <div class="lab">${actual!=null?"实际（已抓到）":"参考"}</div>
      <div class="mid num">${actual!=null?actual.toLocaleString():"—"}</div>
      <div class="sub">${actual!=null
        ? `预测误差 ${Math.abs(res.pred-actual)}（${(Math.abs(res.pred-actual)/Math.max(1,actual)*100).toFixed(1)}%）`
        : `训练用了 ${res.daysUsed} 个历史批次`}</div>
    </div>`;
}

function renderChart(model, history, targetPoints, res, T, batch){
  const start=batchStart(batch);
  const ts=[]; history.forEach(h=>h.points.forEach(p=>ts.push(p.t))); targetPoints.forEach(p=>ts.push(p.t));
  let lo=ts.length?Math.min(...ts):0, hi=ts.length?Math.max(...ts):1200;
  hi=Math.max(hi,T); lo=Math.min(lo,0);
  const grid=[]; for(let t=Math.floor(lo/20)*20; t<=Math.ceil(hi/20)*20; t+=20) grid.push(t);

  // 横轴标签：真实钟点，跨夜那点带上日期
  let prevDate=null;
  const labels=grid.map(t=>{ const s=nyStamp(start+t*60000);
    const lab=(prevDate && s.date!==prevDate) ? `${s.date.slice(5)} ${s.hm}` : s.hm;
    prevDate=s.date; return lab; });

  const ds=[];
  history.forEach(h=>{ const f=h.points[0].t, l=h.points[h.points.length-1].t;
    ds.push({label:h.batch, data:grid.map(t=>(t>=f&&t<=l)?Math.round(qtyAt(h.points,t)):null),
      borderColor:"rgba(131,131,141,.28)", borderWidth:1, pointRadius:0, tension:.25, spanGaps:false}); });
  if(res.ok){
    ds.push({label:"上界", data:grid.map(t=>Math.round(res.estFinal*(model.fbar(t)+model.fsig(t)))),
      borderColor:"transparent", backgroundColor:"rgba(236,139,60,.10)", pointRadius:0, fill:"+1", tension:.3, order:5});
    ds.push({label:"下界", data:grid.map(t=>Math.round(res.estFinal*Math.max(0,model.fbar(t)-model.fsig(t)))),
      borderColor:"transparent", pointRadius:0, fill:false, tension:.3, order:5});
    ds.push({label:"预测曲线", data:grid.map(t=>Math.round(res.estFinal*model.fbar(t))),
      borderColor:"#ec8b3c", borderDash:[6,4], borderWidth:2, pointRadius:0, tension:.3, order:2});
  }
  if(targetPoints.length){ const l=targetPoints[targetPoints.length-1].t;
    ds.push({label:"本批实测", data:grid.map(t=>t<=l?Math.round(qtyAt(targetPoints,t)):null),
      borderColor:"#5bb98c", borderWidth:2.5, pointRadius:2, tension:.25, spanGaps:false, order:1}); }
  if(res.ok){ const gT=grid.find(g=>g>=T);
    ds.push({label:`预测 ${hhmmOf(T,start)}`, data:grid.map(t=>t===gT?res.pred:null),
      borderColor:"#ec8b3c", backgroundColor:"#ec8b3c", pointRadius:6, pointHoverRadius:7, showLine:false, order:0}); }

  const cfg={type:"line", data:{labels, datasets:ds}, options:{
    responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
    plugins:{
      legend:{labels:{color:"#83838d", font:{family:"Space Grotesk"},
        filter:i=>!["上界","下界"].includes(i.text) && !/^NJSUB-/.test(i.text)}},
      tooltip:{backgroundColor:"#1b1b22", borderColor:"#2a2a32", borderWidth:1, titleColor:"#ece9e3", bodyColor:"#ece9e3",
        filter:i=>!["上界","下界"].includes(i.dataset.label)}},
    scales:{
      x:{ticks:{color:"#5b5b64", maxRotation:0, autoSkip:true, maxTicksLimit:12, font:{family:"JetBrains Mono"}}, grid:{color:"#1c1c22"}},
      y:{ticks:{color:"#5b5b64", font:{family:"JetBrains Mono"}}, grid:{color:"#1c1c22"}, beginAtZero:true}}}};
  if(chart) chart.destroy();
  chart=new Chart($("#chart"), cfg);
  $("#chartSub").textContent="灰=历史批次 · 橙虚线=预测 · 绿=本批实测 · 纽约时间";
  if(!history.length && !targetPoints.length){
    $("#chartBox").innerHTML=`<div class="empty"><div class="big">这个仓库暂无数据</div>换个仓库或批次试试。</div>`;
    chart=null;
  }
}

init();
</script>
</body>
</html>
