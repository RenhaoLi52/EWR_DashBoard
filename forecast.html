    若目标当天已有数据，会用最新的点<b>反推今天的最终值</b>再预测（更准）；当天还没数据则用历史平均。

<script>

/* ===== Supabase（SUPABASE_ANON_KEY 填 Publishable key sb_publishable_…） ===== */
const SUPABASE_URL      = "https://euibahjwdfgtoqvchibb.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_dQ1a562_DS1hN9i1G1O3jA_PlgXE54E";
/* ============================================================== */

const TZ="America/New_York";
const $=s=>document.querySelector(s);
let sb=null, chart=null;
const state={ batches:[], templates:[], source:"route", entityName:new Map() };

/* ---------- 纽约时区工具 ---------- */
function tzOffset(date){
  const p=new Intl.DateTimeFormat("en-US",{timeZone:TZ,hourCycle:"h23",year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",second:"2-digit"})
    .formatToParts(date).reduce((a,x)=>(a[x.type]=x.value,a),{});
  return (Date.UTC(+p.year,+p.month-1,+p.day,+p.hour,+p.minute,+p.second)-date.getTime())/60000;
}
/* 纽约本地时间 → UTC 毫秒 */
function nyToUTC(y,mo,d,h,mi){
  const guess=Date.UTC(y,mo-1,d,h,mi);
  let off=tzOffset(new Date(guess));
  let inst=guess-off*60000;
  off=tzOffset(new Date(inst));
  return guess-off*60000;
}
/* UTC 瞬间 → 纽约的 {日期, 钟点} */
function nyStamp(ms){
  const p=new Intl.DateTimeFormat("en-CA",{timeZone:TZ,year:"numeric",month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit",hourCycle:"h23"})
    .formatToParts(new Date(ms)).reduce((a,x)=>(a[x.type]=x.value,a),{});
  return { date:`${p.year}-${p.month}-${p.day}`, hm:`${p.hour}:${p.minute}` };
}

/* ---------- 单号解析 ----------
   NJSUB-YYYYMMDDHHMM：第0天生成时刻，就是这个批次的“起点”。
   备货日(第1天) = 第0天 + 1。派送(第2天) = 第0天 + 2。 */
function batchStart(batch){                       // → UTC 毫秒
  const m=(batch||"").match(/(20\d{2})(\d{2})(\d{2})(\d{2})(\d{2})/);
  if(!m) return null;
  return nyToUTC(+m[1],+m[2],+m[3],+m[4],+m[5]);
}
function stockDay(batch){                         // 备货日 = 单号日期 + 1
  const m=(batch||"").match(/(20\d{2})(\d{2})(\d{2})/);
  if(!m) return null;
  const d=new Date(Date.UTC(+m[1],+m[2]-1,+m[3]+1));
  return {y:d.getUTCFullYear(), mo:d.getUTCMonth()+1, d:d.getUTCDate(),
          str:`${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,"0")}-${String(d.getUTCDate()).padStart(2,"0")}`};
}
function batchLabel(b){ const s=stockDay(b); return s ? `${s.str} 备货 · ${b}` : b; }

/* 批次内的相对时间(分钟) ←→ 显示标签 */
function elapsedMin(capturedISO, start){ return Math.round((new Date(capturedISO).getTime()-start)/60000); }
function tLabel(t, start){ const s=nyStamp(start+t*60000); return s.hm; }

/* 目标时刻：备货日的某个钟点 → 相对分钟 */
function targetT(batch, hhmm){
  const sd=stockDay(batch), start=batchStart(batch);
  if(!sd||start==null) return null;
  const [h,mi]=hhmm.split(":").map(Number);
  return Math.round((nyToUTC(sd.y,sd.mo,sd.d,h,mi)-start)/60000);
}
function hhmmOf(t,start){ return tLabel(t,start); }

/* ============================================================
   仓库特殊规则（按业务实际，只有这4个需要处理）
   ------------------------------------------------------------
   cutoff  19:00停机 → 19:00 的值就是终值，之后的点全部丢弃
           SYR(71) / ALB(57)
   reflow  19:00–21:00 之间会把货转入下一批(出货一次，时间不定)，
           但之后仍继续进货到 21:00 停机。
           → 把出掉的量加回来，让曲线恢复单调，21:00 才是终值
           BOS(39) / RIC(52)
   其余仓库：21:00 停机、单调递增，不处理。
   ============================================================ */
const WH_RULES = {
  71: {type:"cutoff", at:"19:00"},   // SYR
  57: {type:"cutoff", at:"19:00"},   // ALB
  39: {type:"reflow", from:"19:00"}, // BOS
  52: {type:"reflow", from:"19:00"}, // RIC
};

/* 把某仓库某批次的原始点列，按规则修正成"真实累计曲线" */
function applyWarehouseRule(pts, whId, batch){
  const rule = WH_RULES[whId];
  if(!rule || !pts.length) return {pts, note:null};
  const start = batchStart(batch);
  const tAt = (hhmm)=>targetT(batch, hhmm);   // 备货日的钟点 → 相对分钟

  if(rule.type==="cutoff"){
    const T = tAt(rule.at);
    const kept = pts.filter(p=>p.t<=T);
    const dropped = pts.length - kept.length;
    return { pts: kept,
             note: dropped ? `${rule.at} 停机，已忽略之后 ${dropped} 个点` : null };
  }

  if(rule.type==="reflow"){
    const T = tAt(rule.from);
    let shipped = 0, events = [];
    const fixed = pts.map((p,i)=>{
      if(i>0 && p.t>T){
        const drop = pts[i-1].qty - p.qty;      // 用"原始"前一点比，避免重复计
        if(drop > 0){ shipped += drop; events.push({t:p.t, drop}); }
      }
      return { t:p.t, qty:p.qty + shipped };
    });
    const note = events.length
      ? `${rule.from} 后转出 ${shipped} 件（${events.map(e=>hhmmOf(e.t,start)+" −"+e.drop).join("、")}），已加回`
      : null;
    return { pts: fixed, note };
  }
  return {pts, note:null};
}

/* 安全网：不在规则表里的仓库/路线如果出现下降，说明业务变了，要告警 */
function detectDrop(pts){
  for(let i=1;i<pts.length;i++) if(pts[i].qty < pts[i-1].qty)
    return { at:pts[i].t, from:pts[i-1].qty, to:pts[i].qty };
  return null;
}

/* ---------- 预测数学 ---------- */
function qtyAt(pts,t){
  if(!pts.length) return null;
  if(t<=pts[0].t) return pts[0].qty;
  if(t>=pts[pts.length-1].t) return pts[pts.length-1].qty;
  for(let i=1;i<pts.length;i++){ if(t<=pts[i].t){ const a=pts[i-1],b=pts[i];
    return a.qty+(b.qty-a.qty)*((t-a.t)/(b.t-a.t)); } }
  return pts[pts.length-1].qty;
}
const finalOf=pts=>pts.length?Math.max(...pts.map(p=>p.qty)):0;
const mean=a=>a.reduce((s,x)=>s+x,0)/a.length;
const std=a=>a.length<2?0:Math.sqrt(mean(a.map(x=>(x-mean(a))**2)));

function buildModel(history){
  const days=history.filter(d=>finalOf(d.points)>0 && d.points.length>=3);
  const finals=days.map(d=>finalOf(d.points));
  return {
    days,
    histFinal:    days.length?mean(finals):0,
    histFinalStd: days.length?std(finals):0,
    fbar: t=> days.length?mean(days.map(d=>qtyAt(d.points,t)/finalOf(d.points))):0,
    fsig: t=> days.length?std (days.map(d=>qtyAt(d.points,t)/finalOf(d.points))):0,
  };
}
function predict(model, targetPoints, T){
  if(model.days.length===0) return {ok:false};
  const before=(targetPoints||[]).filter(p=>p.t<=T).sort((a,b)=>a.t-b.t);
  let estFinal, calibrated=false, anchor=null;
  if(before.length){
    anchor=before[before.length-1];
    const fa=model.fbar(anchor.t);
    if(fa>0.1){ estFinal=anchor.qty/fa; calibrated=true; } else estFinal=model.histFinal;
  } else estFinal=model.histFinal;
  const fT=model.fbar(T), sT=model.fsig(T);
  const pred=estFinal*fT;
  let band=estFinal*sT + (calibrated?0:model.histFinalStd*fT);
  band=Math.max(band, pred*0.03);
  return {ok:true, pred:Math.round(pred), band:Math.round(band),
          lo:Math.max(0,Math.round(pred-band)), hi:Math.round(pred+band),
          estFinal:Math.round(estFinal), calibrated, anchor, daysUsed:model.days.length};
}

/* ---------- 数据源定义 ---------- */
const SOURCES={
  route:     { table:"snapshots",           idField:"driver_id",    batchField:"batch_list",
               batchView:"route_batches", metric:"order_count", unit:"单量", kind:"route",
               mode:"sum",   // 模板里的路线加和成一条 → 预测这个模板的总量
               note:"路线：把模板里的路线<b>加和</b>成一条曲线，预测这个模板(车)最终跑多少单。" },
  warehouse: { table:"warehouse_snapshots", idField:"warehouse_id", batchField:"batch_no",
               batchView:"warehouse_batches", metric:"qty", unit:"货量", kind:"warehouse",
               mode:"split", // 模板里的仓库各自一条 → 每个仓库单独预测
               note:"仓库：模板里的每个仓库<b>各自一条</b>曲线，分别预测各自的最终货量。" },
};
const PALETTE=["#ec8b3c","#6f9fd8","#5bb98c","#c96a5e","#b98cd8","#d8b46f","#6fd8c4","#c98cae"];
function src(){ return SOURCES[state.source]; }

/* ---------- 初始化 ---------- */
function init(){
  if(SUPABASE_URL.includes("你的项目")||SUPABASE_ANON_KEY.includes("在此")){ $("#setup").style.display="block"; return; }
  $("#app").style.display="block";
  sb=supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  state.source="route";
  $("#predictBtn").onclick=doPredict;
  $("#tplSelect").onchange=doPredict;
  $("#batchSelect").onchange=doPredict;
  $("#sourceSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>switchSource(b.dataset.s));
  bootstrap();
}
function setConn(ok,t){ $("#connDot").className="dot "+(ok?"ok":"err"); $("#connText").textContent=t; }

async function bootstrap(){
  try{
    await loadTemplates();
    await loadEntityNames();
    await loadBatches();
    $("#modeNote").style.display="block";
    $("#modeNote").innerHTML=src().note;
    setConn(true,"已连接");
    doPredict();
  }catch(e){ console.error(e); setConn(false,"连接失败："+(e.message||e)); }
}

async function switchSource(s){
  if(s===state.source) return;
  state.source=s;
  $("#sourceSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("active", b.dataset.s===s));
  setConn(true,"加载中…");
  try{
    await loadEntityNames();
    renderTplOptions();
    await loadBatches();
    $("#modeNote").innerHTML=src().note;
    setConn(true,"已连接");
    doPredict();
  }catch(e){ setConn(false,"出错："+(e.message||e)); }
}

/* 模板（和 route-stats 用同一张表、同一套 kind） */
async function loadTemplates(){
  const { data, error } = await sb.from("route_templates").select("*").order("created_at",{ascending:true});
  if(error) throw error;
  state.templates=data||[];
  renderTplOptions();
}
function currentTemplates(){ return state.templates.filter(t=>(t.kind||"route")===state.source); }
function renderTplOptions(){
  const sel=$("#tplSelect"); const cur=currentTemplates(); sel.innerHTML="";
  if(!cur.length){
    const o=document.createElement("option"); o.value=""; o.textContent="（还没有模板）"; sel.appendChild(o); return;
  }
  cur.forEach(t=>{ const o=document.createElement("option"); o.value=t.id;
    o.textContent=`${t.name}（${(t.driver_ids||[]).length}项）`; sel.appendChild(o); });
}
function selectedTemplate(){ return state.templates.find(t=>String(t.id)===$("#tplSelect").value) || null; }

/* 成员名字（仓库要显示名字；路线就用ID） */
async function loadEntityNames(){
  state.entityName=new Map();
  if(state.source!=="warehouse") return;
  const { data, error } = await sb.from("warehouse_list").select("warehouse_id,warehouse_name").limit(500);
  if(error) throw error;
  (data||[]).forEach(r=>state.entityName.set(r.warehouse_id, r.warehouse_name||String(r.warehouse_id)));
}
function nameOf(id){ return state.entityName.get(id) || String(id); }

async function loadBatches(){
  const { data, error } = await sb.from(src().batchView)
    .select("batch").order("batch",{ascending:false}).limit(200);
  if(error) throw error;
  state.batches=(data||[]).map(r=>r.batch).filter(b=>batchStart(b)!=null);
  const sel=$("#batchSelect"); sel.innerHTML="";
  state.batches.forEach(b=>{ const o=document.createElement("option"); o.value=b; o.textContent=batchLabel(b); sel.appendChild(o); });
}

/* 取若干批次的原始行 */
async function fetchRows(ids, batches){
  const S=src(); let all=[], from=0, page=1000;
  while(true){
    const { data, error } = await sb.from(S.table)
      .select(`${S.batchField},captured_at,${S.idField},${S.metric}`)
      .in(S.idField, ids).in(S.batchField, batches)
      .order("captured_at",{ascending:true}).range(from, from+page-1);
    if(error) throw error;
    all=all.concat(data||[]);
    if(!data || data.length<page) break;
    from+=page;
  }
  return all;
}

/* 原始行 → 每条“序列”在每个批次里的曲线
   route(sum)   : 一个序列 = 整个模板（成员加和）
   warehouse(split): 一个序列 = 一个仓库 */
function buildSeries(rows, tpl, batches){
  const S=src(); const ids=tpl.driver_ids||[];
  const series = S.mode==="sum"
    ? [{ key:"__all__", name:tpl.name, ids, color: tpl.color||PALETTE[0] }]
    : ids.map((id,i)=>({ key:String(id), name:nameOf(id), ids:[id], color:PALETTE[i%PALETTE.length] }));

  // batch → captured_at → idField → value
  const idx=new Map();
  for(const r of rows){
    const b=r[S.batchField], ts=r.captured_at;
    if(!idx.has(b)) idx.set(b,new Map());
    const m=idx.get(b);
    if(!m.has(ts)) m.set(ts,new Map());
    m.get(ts).set(r[S.idField], r[S.metric]||0);
  }
  // 每个序列、每个批次 → 有序点列 [{t,qty}]
  const isWh = S.kind==="warehouse";
  for(const se of series){
    se.byBatch=new Map(); se.notes=[]; se.warns=[];
    for(const b of batches){
      const st=batchStart(b); const m=idx.get(b); if(st==null||!m) continue;
      let pts=[...m.entries()].map(([ts,vals])=>{
        let sum=0; for(const id of se.ids) sum += (vals.get(id)||0);
        return { t:elapsedMin(ts,st), qty:sum };
      }).sort((a,b2)=>a.t-b2.t);
      if(!pts.length) continue;

      // 仓库(split)模式下，每条序列就是一个仓库 → 可以套规则
      if(isWh && se.ids.length===1){
        const r=applyWarehouseRule(pts, se.ids[0], b);
        pts=r.pts;
        if(r.note && b===batches[0]) se.notes.push(r.note);   // 只提示目标批次的
      }
      // 安全网：修正后仍然下降 = 业务变了
      const d=detectDrop(pts);
      if(d && b===batches[0]) se.warns.push(`${hhmmOf(d.at, st)} 出现回落 ${d.from} → ${d.to}`);

      se.byBatch.set(b, pts);
    }
  }
  return series;
}

/* ---------- 预测主流程 ---------- */
async function doPredict(){
  const tpl=selectedTemplate();
  const target=$("#batchSelect").value;
  const n=Math.max(2, Number($("#nDays").value)||10);
  const box=$("#result");
  if(!tpl){ box.innerHTML=`<div class="rcard"><div class="accentbar"></div><div class="lab">预测</div>
      <div class="empty" style="padding:10px 0">这个数据源还没有模板。先去「数量统计」页建一个。</div></div>`;
    if(chart){chart.destroy();chart=null;} return; }
  if(!target) return;
  const T=targetT(target, $("#timePick").value);
  if(T==null) return;

  setConn(true,"计算中…");
  try{
    const i=state.batches.indexOf(target);
    const hist=state.batches.slice(i+1, i+1+n);
    const useBatches=[target, ...hist];
    const rows=await fetchRows(tpl.driver_ids||[], useBatches);
    const series=buildSeries(rows, tpl, useBatches);

    const results=series.map(se=>{
      const history=hist.map(b=>({batch:b, points:se.byBatch.get(b)||[]})).filter(h=>h.points.length);
      const targetPoints=se.byBatch.get(target)||[];
      const model=buildModel(history);
      return { se, model, history, targetPoints, res:predict(model,targetPoints,T) };
    });

    renderResults(results, T, target);
    renderChart(results, T, target);
    setConn(true,"已连接");
  }catch(e){ console.error(e); setConn(false,"出错："+(e.message||e)); }
}

function renderResults(results, T, batch){
  const box=$("#result"); const start=batchStart(batch); const sd=stockDay(batch); const S=src();
  box.innerHTML="";
  if(!results.length){ box.innerHTML=`<div class="rcard"><div class="accentbar"></div><div class="empty" style="padding:10px 0">模板是空的。</div></div>`; return; }

  results.forEach(({se,res,targetPoints})=>{
    if(!res.ok){
      box.innerHTML+=`<div class="rcard"><div class="accentbar" style="background:${se.color}"></div>
        <div class="lab"><span class="sw" style="background:${se.color}"></span>${esc(se.name)}</div>
        <div class="empty" style="padding:10px 0">历史批次不足（至少2个，建议7–10个）。</div></div>`;
      return;
    }
    const last=targetPoints.length?targetPoints[targetPoints.length-1]:null;
    const actual=(last && last.t>=T) ? Math.round(qtyAt(targetPoints,T)) : null;
    const err = actual!=null
      ? `<div class="sub">实际 <b class="num">${actual.toLocaleString()}</b> · 误差 ${Math.abs(res.pred-actual)}（${(Math.abs(res.pred-actual)/Math.max(1,actual)*100).toFixed(1)}%）</div>`
      : `<div class="sub">${res.calibrated
          ? `已用本批 ${hhmmOf(res.anchor.t,start)} 实测 ${res.anchor.qty} 校准`
          : `本批还没数据，用历史平均`} · ${res.daysUsed}批训练</div>`;
    const warn = res.daysUsed<7 ? `<div class="sub" style="color:var(--orange)">⚠ 仅 ${res.daysUsed} 批历史，精度有限</div>` : "";
    const note = (se.notes||[]).map(n=>`<div class="sub" style="color:var(--blue)">✎ ${esc(n)}</div>`).join("");
    const bad  = (se.warns||[]).map(w=>`<div class="sub" style="color:var(--red)">⚠ ${esc(w)}（模型假定只增不减，此预测可能不准）</div>`).join("");
    box.innerHTML+=`
      <div class="rcard"><div class="accentbar" style="background:${se.color}"></div>
        <div class="lab"><span class="sw" style="background:${se.color}"></span>${esc(se.name)}</div>
        <div class="big num">${res.pred.toLocaleString()}</div>
        <div class="rng">± ${res.band}　( ${res.lo} – ${res.hi} )</div>
        ${err}${warn}${note}${bad}
      </div>`;
  });
  $("#chartSub").textContent=`${sd?sd.str+" 备货 · ":""}${hhmmOf(T,start)} · ${S.unit} · 纽约时间`;
}

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function renderChart(results, T, batch){
  const start=batchStart(batch);
  const ts=[];
  results.forEach(({history,targetPoints})=>{ history.forEach(h=>h.points.forEach(p=>ts.push(p.t))); targetPoints.forEach(p=>ts.push(p.t)); });
  let lo=ts.length?Math.min(...ts):0, hi=ts.length?Math.max(...ts):1320;
  hi=Math.max(hi,T); lo=Math.min(lo,0);
  const grid=[]; for(let t=Math.floor(lo/20)*20; t<=Math.ceil(hi/20)*20; t+=20) grid.push(t);

  let prevDate=null;
  const labels=grid.map(t=>{ const s=nyStamp(start+t*60000);
    const lab=(prevDate && s.date!==prevDate) ? `${s.date.slice(5)} ${s.hm}` : s.hm;
    prevDate=s.date; return lab; });

  const ds=[]; const gT=grid.find(g=>g>=T);
  results.forEach(({se,model,history,targetPoints,res})=>{
    // 历史各批（灰细线，只在单序列时画，多序列会太乱）
    if(results.length===1){
      history.forEach(h=>{ const f=h.points[0].t, l=h.points[h.points.length-1].t;
        ds.push({label:h.batch, data:grid.map(t=>(t>=f&&t<=l)?Math.round(qtyAt(h.points,t)):null),
          borderColor:"rgba(131,131,141,.26)", borderWidth:1, pointRadius:0, tension:.25, spanGaps:false, order:9}); });
    }
    if(res.ok){
      ds.push({label:se.name+" 预测", data:grid.map(t=>Math.round(res.estFinal*model.fbar(t))),
        borderColor:se.color, borderDash:[6,4], borderWidth:2, pointRadius:0, tension:.3, order:2});
      ds.push({label:se.name+` 预测@${hhmmOf(T,start)}`, data:grid.map(t=>t===gT?res.pred:null),
        borderColor:se.color, backgroundColor:se.color, pointRadius:6, pointHoverRadius:7, showLine:false, order:0});
    }
    if(targetPoints.length){ const l=targetPoints[targetPoints.length-1].t;
      ds.push({label:se.name+" 实测", data:grid.map(t=>t<=l?Math.round(qtyAt(targetPoints,t)):null),
        borderColor:se.color, borderWidth:2.5, pointRadius:2, tension:.25, spanGaps:false, order:1}); }
  });

  const cfg={type:"line", data:{labels, datasets:ds}, options:{
    responsive:true, maintainAspectRatio:false, interaction:{mode:"index", intersect:false},
    plugins:{
      legend:{labels:{color:"#83838d", font:{family:"Space Grotesk"}, filter:i=>!/^NJSUB-/.test(i.text) && !/预测@/.test(i.text)}},
      tooltip:{backgroundColor:"#1b1b22", borderColor:"#2a2a32", borderWidth:1, titleColor:"#ece9e3", bodyColor:"#ece9e3"}},
    scales:{
      x:{ticks:{color:"#5b5b64", maxRotation:0, autoSkip:true, maxTicksLimit:12, font:{family:"JetBrains Mono"}}, grid:{color:"#1c1c22"}},
      y:{ticks:{color:"#5b5b64", font:{family:"JetBrains Mono"}}, grid:{color:"#1c1c22"}, beginAtZero:true}}}};
  if(chart) chart.destroy();
  chart=new Chart($("#chart"), cfg);
  if(!ds.length){ $("#chartBox").innerHTML=`<div class="empty"><div class="big">暂无数据</div>换个模板或批次试试。</div>`; chart=null; }
}

init();
</script>
